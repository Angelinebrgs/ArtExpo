services:
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: frontend
    working_dir: /app
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3000:3000"

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: backend
    working_dir: /app
    volumes:
      - ./back:/app
      - back_node_modules:/app/node_modules
      - back_data:/app/data
      - back_uploads:/app/public/uploads
    command: sh -c "npm ci && npm run develop"
    ports:
      - "1337:1337"
    env_file: .env
    environment:
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: ./data/data.db

volumes:
  front_node_modules:
  back_node_modules:
  back_data:
  back_uploads:
